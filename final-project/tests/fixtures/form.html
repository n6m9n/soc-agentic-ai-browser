<!doctype html>
<html>
<head><meta charset="utf-8"><title>Test Form</title></head>
<body>
  <h1>Registration</h1>
  <form id="reg" onsubmit="document.getElementById('status').textContent='submitted'; return false;">
    <label for="firstName">First Name</label>
    <input id="firstName" name="firstName" type="text"><br>

    <label for="email">Email</label>
    <input id="email" name="email" type="email"><br>

    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel"><br>

    <span>Gender</span>
    <label><input type="radio" name="gender" value="Male" aria-label="Gender Male">Male</label>
    <label><input type="radio" name="gender" value="Female" aria-label="Gender Female">Female</label><br>

    <label for="country">Country</label>
    <select id="country" name="country">
      <option value="">--</option>
      <option value="USA">USA</option>
      <option value="India">India</option>
    </select><br>

    <label for="bio">Bio</label>
    <textarea id="bio" name="bio"></textarea><br>

    <label for="resume">Resume</label>
    <input id="resume" name="resume" type="file"><br>

    <label for="subscribe">Subscribe</label>
    <input id="subscribe" name="subscribe" type="checkbox"><br>

    <button id="submit" type="submit">Submit</button>
    <input type="hidden" name="csrf" value="x">
  </form>
  <div id="status"></div>
</body>
</html>
